general {
        colors = true
        interval = 5
        color_good = "#c6d0f5"
        color_degraded = "#e78284"
        color_bad = "#e78284"
}

order += "cpu_usage"
order += "memory"
order += "disk /"
order += "volume master"
order += "wireless _first_"
order += "ethernet _first_"
order += "battery 0"
order += "tztime local"


wireless _first_ {
        format_up = "  %essid  "
        format_down = "🌐 Down  "
}

volume master {
        format = "   %volume  "
        format_muted = "  %volume  "
        device = "default"
        mixer = "Master"
        mixer_idx = 0
}

ethernet _first_ {
        format_up = " E: %ip (%speed)"
        format_down = " E: down "
        # format_up = "🖧 %ip (%speed)"
        # format_down = "🖧  down"
}

battery 0 {
        format = "%status %percentage"
        hide_seconds = true
        integer_battery_capacity = true
        last_full_capacity = true
        status_chr = "⚡+"
        status_bat = "⚡"
        status_full = "⚡"
}

disk "/" {
        # format = "💽 %used / %total"
        format = " DISK: %used / %total "
}

cpu_usage {
        format = " CPU: %usage "
}

memory {
        format = " RAM: %used / %total "
        threshold_degraded = "1G"
        format_degraded = "MEMORY < %available"
}

tztime local {
        format = "    %a %d-%m-%Y     %H:%M  "
}
